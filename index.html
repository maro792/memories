<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ذكرياتنا ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
  text-align: center;
  color: white;
}

h1 {
  margin-top: 20px;
  font-size: 35px;
}

.memory {
  margin: 20px auto;
  padding: 15px;
  width: 80%;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

.memory img {
  width: 100%;
  max-width: 300px;
  border-radius: 15px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

#secret {
  display: none;
  margin-top: 20px;
  font-size: 18px;
}
</style>

</head>

<body>

<h1>ذكرياتنا ❤️</h1>

<div class="memory">
  <img src="photo1.jpg">
  <p>أحلى صورة لينا ❤️</p>
</div>

<div class="memory">
  <img src="photo2.jpg">
 <p>أجمل لحظة ❤️</p>
</div>
<button onclick="showMessage()">اضغط هنا 💌</button>


<div id="secret">
  ?? ÈÍÈß ÌÏðÇ æãÈÓæØ Èßá áÍÙÉ ãÚÇß ??
</div>

<audio autoplay loop muted id="music">
  <source src="music.mp3" type="audio/mpeg">
</audio>
<div id="secret" style="display:none; margin-top:20px;">
  بحبك جدًا ❤️
</div>
<script>
function showMessage() {
  document.getElementById("secret").style.display = "block";
}
</script>
document.body.addEventListener("click", function() {
  document.getElementById("music").muted = false;
});
</body>
</html>
